<!DOCTYPE html>
<html>
<head>
    <title>AI Fashion Advisor - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6c63ff, #8f88ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 35px;
            border-radius: 18px;
            width: 380px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.18);
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6c63ff;
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover {
            background: #574fd6;
        }

        .secondary-btn {
            background: #eef0ff;
            color: #333;
        }

        .secondary-btn:hover {
            background: #dfe3ff;
        }

        .message {
            margin-top: 14px;
            font-size: 14px;
            color: #444;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>AI Fashion Advisor</h2>
    <p>Login or create a new account to continue</p>

    <input type="text" id="username" placeholder="Enter username">
    <input type="password" id="password" placeholder="Enter password">

    <button onclick="login()">Login</button>
    <button class="secondary-btn" onclick="signup()">Create New Account</button>

    <div id="message" class="message"></div>
</div>

<script>
    async function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const messageBox = document.getElementById("message");

        if (!username || !password) {
            messageBox.innerText = "Please enter username and password.";
            return;
        }

        try {
            const response = await fetch("http://127.0.0.1:5000/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (!response.ok || data.error) {
                messageBox.innerText = data.error || "Login failed.";
                return;
            }

            localStorage.setItem("loggedInUser", data.username);
            window.location.href = "index.html";

        } catch (error) {
            messageBox.innerText = "Backend connection issue.";
            console.log(error);
        }
    }

    async function signup() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const messageBox = document.getElementById("message");

        if (!username || !password) {
            messageBox.innerText = "Please enter username and password.";
            return;
        }

        try {
            const response = await fetch("http://127.0.0.1:5000/signup", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (!response.ok || data.error) {
                messageBox.innerText = data.error || "Signup failed.";
                return;
            }

            messageBox.innerText = "Account created successfully. Now login.";

        } catch (error) {
            messageBox.innerText = "Backend connection issue.";
            console.log(error);
        }
    }
</script>

</body>
</html>
